name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - claude/graphify-plugin-0n39xh

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Write environment variables
        run: |
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GOOGLE_OAUTH_WEB_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_OAUTH_WEB_CLIENT_ID }}
          EOF

      - name: Generate native Android project
        run: npx expo prebuild --platform android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk AfroLoveWorld-${{ github.run_number }}.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AfroLoveWorld-${{ github.run_number }}
          path: AfroLoveWorld-${{ github.run_number }}.apk
          retention-days: 30

      - name: Publish APK to a GitHub Release (permanent download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: AfroLove World — Android build #${{ github.run_number }}
          body: |
            APK Android généré automatiquement depuis le commit ${{ github.sha }}.
            Build de debug (non signé pour le Play Store) — installable directement sur un appareil Android
            en autorisant les "sources inconnues".
          files: AfroLoveWorld-${{ github.run_number }}.apk
