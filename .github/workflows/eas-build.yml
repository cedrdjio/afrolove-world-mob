name: EAS Build (Android)

# Déclenchement MANUEL uniquement (bouton « Run workflow » dans l'onglet
# Actions, utilisable depuis un navigateur mobile). Le déclenchement sur
# push a été retiré : il relançait un build EAS à chaque commit et consommait
# le quota de builds.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profil eas.json à utiliser'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS
        id: eas_build
        run: |
          PROFILE="${{ inputs.profile || 'preview' }}"
          eas build --platform android --profile "$PROFILE" --non-interactive --wait --json > eas-build-result.json
          cat eas-build-result.json
          URL=$(node -pe 'const j=JSON.parse(require("fs").readFileSync("eas-build-result.json","utf8")); const b=Array.isArray(j)?j[0]:j; (b.artifacts && (b.artifacts.applicationArchiveUrl || b.artifacts.buildUrl)) || ""')
          if [ -z "$URL" ]; then echo "Aucune URL d'artefact trouvée"; exit 1; fi
          EXT="${URL##*.}"; case "$EXT" in apk|aab) : ;; *) EXT=apk ;; esac
          echo "artifact_url=$URL" >> "$GITHUB_OUTPUT"
          echo "artifact_ext=$EXT" >> "$GITHUB_OUTPUT"

      - name: Download build artifact
        run: curl -L -o "AfroLoveWorld-${{ github.run_number }}.${{ steps.eas_build.outputs.artifact_ext }}" "${{ steps.eas_build.outputs.artifact_url }}"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AfroLoveWorld-${{ github.run_number }}
          path: AfroLoveWorld-${{ github.run_number }}.${{ steps.eas_build.outputs.artifact_ext }}
          retention-days: 30

      - name: Publish to a GitHub Release (lien de téléchargement permanent)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: eas-build-${{ github.run_number }}
          name: AfroLove World — EAS build #${{ github.run_number }}
          body: |
            Build Android généré via EAS Build depuis le commit ${{ github.sha }}.
            Fichier .apk = installable directement pour tester ;
            fichier .aab = à envoyer sur la Play Console (profil production).
          files: AfroLoveWorld-${{ github.run_number }}.${{ steps.eas_build.outputs.artifact_ext }}
