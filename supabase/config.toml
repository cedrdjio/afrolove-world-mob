project_id = "xhpwmondzarbnzciruis"

# payment-initiate is called by the app with its Supabase session — keep the
# JWT check on (this is the default, listed here for clarity).
[functions.payment-initiate]
verify_jwt = true

# payment-webhook is called by CamerPay's servers, not a signed-in user, so the
# platform JWT check must be off. Authenticity is enforced in code via the
# HMAC-SHA256 signature on the payload.
[functions.payment-webhook]
verify_jwt = false

# payment-status is called by the app with its Supabase session while waiting
# for a payment confirmation — JWT check on.
[functions.payment-status]
verify_jwt = true

# payment-return only bridges the browser redirect after payment back to the
# app deep link (afrolove://premium/callback). The caller is the customer's
# browser redirected by CamerPay — no Supabase session, JWT check off.
[functions.payment-return]
verify_jwt = false
